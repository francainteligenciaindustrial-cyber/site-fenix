<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Dono | Academia Fênix BBU</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicons/favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 380px;
    background: var(--charcoal);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 44px 36px;
    text-align: center;
  }
  .login-card h1 {
    font-family: var(--font-display); font-size: 1.6rem; letter-spacing: .03em;
    text-transform: uppercase; margin: 18px 0 6px;
  }
  .login-card p.sub { color: var(--gray); font-size: .88rem; margin: 0 0 28px; }
  .login-card form { display: grid; gap: 16px; text-align: left; }
  .login-card .error { color: var(--red); font-size: .84rem; min-height: 18px; margin: 0; text-align: center; }
</style>
</head>
<body>

<div class="login-card">
  <span class="brand__text" style="font-size:1.4rem;">FÊNIX <small style="color:var(--orange)">BBU</small></span>
  <h1>Painel do <span class="gradient-text">Dono</span></h1>
  <p class="sub">Acesso restrito. Informe a senha para ver os agendamentos recebidos pelo site.</p>

  <form id="loginForm">
    <label class="form-field">
      <span>Senha</span>
      <input type="password" name="password" required autofocus>
    </label>
    <p class="error" id="loginError"></p>
    <button type="submit" class="btn btn--primary btn--block">Entrar</button>
  </form>
</div>

<script>
  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('loginError');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    const password = form.password.value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = 'Senha incorreta. Tente novamente.';
      }
    } catch (err) {
      errorEl.textContent = 'Erro de conexão. Tente novamente.';
    }
  });
</script>

</body>
</html>
